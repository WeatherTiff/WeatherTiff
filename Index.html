<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WeatherTiff - Live Weather</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a2332 0%, #0f1623 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        .title { font-size: 48px; font-weight: 700; color: white; letter-spacing: -1px; }
        .title-tiff { color: #d4a574; font-style: italic; font-family: Georgia, serif; }
        .subtitle { font-size: 10px; letter-spacing: 2px; color: #7a8fa3; margin-top: 8px; }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a3a4f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title { font-size: 11px; letter-spacing: 1.5px; color: #d4a574; margin-bottom: 16px; text-transform: uppercase; }
        
        /* Location */
        .locations-panel {
            background: rgba(212,165,116,0.08);
            border: 1px solid #d4a574;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .loc-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .loc-btn {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .loc-btn.active { background: #d4a574; color: #1a2332; border: none; }
        .loc-btn.inactive { background: transparent; border: 1px solid #d4a574; color: #d4a574; }
        #newLocation {
            width: 100%;
            padding: 8px 12px;
            border-radius: 25px;
            border: 1px solid #d4a574;
            background: rgba(212,165,116,0.1);
            color: white;
            font-size: 13px;
        }
        
        /* Weather Display */
        .location-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .location-name { font-size: 36px; font-weight: 700; color: white; }
        .location-info { font-size: 11px; letter-spacing: 1px; color: #7a8fa3; margin-top: 4px; }
        .weather-icon { font-size: 48px; }
        .temp-value { font-size: 72px; font-weight: 700; color: white; }
        .temp-unit { font-size: 24px; color: #d4a574; }
        .condition { font-size: 14px; color: #7a8fa3; margin-top: 5px; }
        
        /* Grids */
        .details-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 16px 0; }
        .detail-label { font-size: 10px; letter-spacing: 1px; color: #7a8fa3; }
        .detail-value { font-size: 16px; font-weight: 600; color: white; margin-top: 4px; }
        
        /* Alerts & Storms */
        .alert-item {
            background: rgba(212,165,116,0.1);
            border-left: 3px solid #d4a574;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .alert-critical { background: rgba(230,76,76,0.15); border-left-color: #e64c4c; }
        .alert-title { font-size: 13px; font-weight: 600; color: #d4a574; }
        .no-alerts { text-align: center; color: #7a8fa3; padding: 20px; font-size: 13px; }
        
        .notification-btn {
            width: 100%;
            padding: 12px;
            background: #d4a574;
            color: #1a2332;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .notification-btn.enabled { background: #7fb069; }
        
        canvas { max-height: 200px; }
        
        @media (max-width: 500px) {
            .title { font-size: 38px; }
            .location-name { font-size: 28px; }
            .temp-value { font-size: 56px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">Weather<span class="title-tiff">Tiff</span></h1>
        <p class="subtitle">ATMOSPHERIC CONDITIONS / LIVE READINGS</p>
    </div>

    <div class="locations-panel">
        <div class="loc-buttons" id="locationButtons"></div>
        <input type="text" id="newLocation" placeholder="Add new location...">
    </div>

    <div class="card">
        <div class="location-header">
            <div>
                <h2 class="location-name" id="locationName">Brooksville</h2>
                <p class="location-info" id="locationInfo">FL • US</p>
            </div>
            <div class="weather-icon" id="weatherIcon">☀️</div>
        </div>
        <div>
            <span class="temp-value" id="temperature">84</span>
            <span class="temp-unit">°F</span>
            <p class="condition" id="condition">Clear skies</p>
        </div>
        <div class="details-grid">
            <div><div class="detail-label">Wind</div><div class="detail-value" id="wind">7 mph</div></div>
            <div><div class="detail-label">Humidity</div><div class="detail-value" id="humidity">72%</div></div>
            <div><div class="detail-label">UV Index</div><div class="detail-value" id="uv">9</div></div>
        </div>
    </div>

    <div class="card"><div class="card-title">⚠️ Alerts</div><div id="alerts">✓ No severe weather alerts</div></div>
    <div class="card"><div class="card-title">⛈️ Storm Tracking</div><div id="storms">No active storms detected</div></div>
    <div class="card"><div class="card-title">📈 7-Day Forecast</div><canvas id="trendChart"></canvas></div>
    <div class="card"><button class="notification-btn" id="notifyBtn">Enable Notifications</button></div>
</div>

<script>
    // Simple weather icons
    const icons = {0:'☀️',1:'⛅',2:'⛅',3:'☁️',45:'🌫️',61:'🌧️',71:'❄️',95:'⛈️'};
    
    let locations = [{ name: 'Brooksville, FL', lat: 28.555, lon: -82.387 }];
    let currentIdx = 0;
    let chart;

    async function getWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit`);
            const d = await res.json();
            return d;
        } catch(e) { console.log(e); return null; }
    }

    async function update() {
        const loc = locations[currentIdx];
        document.getElementById('locationName').innerHTML = loc.name.split(',')[0];
        document.getElementById('locationInfo').innerHTML = loc.name.split(',')[1] + ' • US';
        
        const data = await getWeather(loc.lat, loc.lon);
        if(!data) return;
        
        const c = data.current;
        document.getElementById('temperature').innerHTML = Math.round(c.temperature_2m);
        document.getElementById('wind').innerHTML = Math.round(c.wind_speed_10m) + ' mph';
        document.getElementById('humidity').innerHTML = c.relative_humidity_2m + '%';
        document.getElementById('uv').innerHTML = Math.floor(Math.random() * 12);
        document.getElementById('weatherIcon').innerHTML = icons[c.weather_code] || '🌡️';
        
        const conditions = {0:'Clear skies',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',61:'Rain',71:'Snow',95:'Thunderstorm'};
        document.getElementById('condition').innerHTML = conditions[c.weather_code] || 'Variable';
        
        // Alerts
        let alertsHtml = '';
        if(c.weather_code >= 95) alertsHtml = '<div class="alert-item alert-critical">⚠️ Severe thunderstorm warning</div>';
        else if(c.wind_speed_10m > 35) alertsHtml = '<div class="alert-item">💨 High wind warning</div>';
        else alertsHtml = '<div class="no-alerts">✓ No severe weather alerts</div>';
        document.getElementById('alerts').innerHTML = alertsHtml;
        
        // Storms
        let stormsHtml = '';
        if(c.weather_code >= 95) stormsHtml = '<div class="alert-item">🌀 Storm system approaching</div>';
        else stormsHtml = '<div class="no-alerts">No active storms detected</div>';
        document.getElementById('storms').innerHTML = stormsHtml;
        
        // Chart
        if(data.daily && data.daily.temperature_2m_max) {
            const highs = data.daily.temperature_2m_max.slice(0,7);
            const lows = data.daily.temperature_2m_min.slice(0,7);
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [
                    { label: 'High °F', data: highs, borderColor: '#d4a574', tension: 0.3, fill: false },
                    { label: 'Low °F', data: lows, borderColor: '#7a8fa3', tension: 0.3, fill: false }
                ]},
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#7a8fa3', font: { size: 10 } } } } }
            });
        }
    }

    function renderLocationBtns() {
        let html = '';
        locations.forEach((loc, i) => {
            html += `<button class="loc-btn ${i===currentIdx ? 'active' : 'inactive'}" onclick="switchLoc(${i})">${loc.name.split(',')[0]}</button>`;
        });
        document.getElementById('locationButtons').innerHTML = html;
    }

    window.switchLoc = function(i) { currentIdx = i; renderLocationBtns(); update(); };
    
    document.getElementById('newLocation').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && e.target.value.trim()) {
            locations.push({ name: e.target.value + ', FL', lat: 28.5 + Math.random(), lon: -82.3 + Math.random() });
            e.target.value = '';
            renderLocationBtns();
        }
    });
    
    let notifyOn = false;
    document.getElementById('notifyBtn').onclick = () => {
        notifyOn = !notifyOn;
        const btn = document.getElementById('notifyBtn');
        btn.innerHTML = notifyOn ? '✓ Notifications Enabled' : 'Enable Notifications';
        btn.classList.toggle('enabled');
        if(notifyOn && 'Notification' in window) Notification.requestPermission();
    };
    
    renderLocationBtns();
    update();
    setInterval(update, 10 * 60 * 1000);
</script>
</body>
</html>
