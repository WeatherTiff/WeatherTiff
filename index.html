<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a2332">
    <title>WeatherTiff Pro - Florida Weather Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a2332 0%, #0f1623 100%);
            min-height: 100vh;
            font-family: 'Open Sans', sans-serif;
            color: #ffffff;
            padding: 20px;
        }
        
        .container { max-width: 700px; margin: 0 auto; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .title {
            font-size: 48px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: white;
        }
        
        .title-tiff { color: #f5a623; font-style: italic; }
        .subtitle { font-size: 10px; letter-spacing: 2px; color: #f5a623; margin-top: 5px; }
        
        .mode-toggle {
            background: #f5a623;
            color: #1a2332;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .mode-toggle.active { background: #ff4444; color: white; animation: pulse 0.5s; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* Location Panel */
        .locations-panel {
            background: rgba(245, 166, 35, 0.1);
            border: 1px solid #f5a623;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .locations-title { font-size: 12px; color: #f5a623; margin-bottom: 12px; font-weight: 700; }
        .locations-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        
        .loc-btn {
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .loc-btn.active { background: #f5a623; color: #1a2332; border: none; }
        .loc-btn.inactive { background: transparent; border: 1px solid #f5a623; color: #f5a623; }
        
        .add-input {
            width: 100%;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #f5a623;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 12px;
        }
        
        .add-input::placeholder { color: #f5a623; }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 166, 35, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        
        .card:hover { border-color: #f5a623; transform: translateY(-2px); }
        .card-title { font-size: 11px; letter-spacing: 2px; color: #f5a623; margin-bottom: 16px; font-weight: 700; }
        
        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .location-name { font-size: 36px; font-weight: 700; font-family: 'Playfair Display', serif; }
        .location-info { font-size: 10px; color: #f5a623; margin-top: 5px; }
        .weather-icon { font-size: 52px; }
        
        .temp-value { font-size: 72px; font-weight: 700; }
        .temp-unit { font-size: 24px; color: #f5a623; }
        .condition { font-size: 14px; color: #ffd700; margin-top: 5px; }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(245,166,35,0.2);
        }
        
        .detail-label { font-size: 10px; color: #f5a623; margin-bottom: 5px; }
        .detail-value { font-size: 16px; font-weight: 700; }
        
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        
        .forecast-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
        }
        
        .forecast-card:hover { background: rgba(245,166,35,0.2); transform: translateY(-2px); }
        .forecast-day { font-size: 10px; color: #f5a623; }
        .forecast-high { font-size: 14px; font-weight: 700; }
        .forecast-low { font-size: 11px; color: #aaa; }
        
        .aqi-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        
        .aqi-value { font-size: 24px; font-weight: 700; color: #f5a623; }
        .aqi-label { font-size: 10px; color: #aaa; }
        
        .alert-item, .storm-item {
            background: rgba(245,166,35,0.1);
            border-left: 3px solid #f5a623;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .alert-critical { border-left-color: #ff4444; background: rgba(255,68,68,0.1); }
        .alert-title { font-size: 12px; font-weight: 700; color: #f5a623; }
        
        .map-container { height: 220px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(245,166,35,0.3); }
        #map { height: 100%; width: 100%; }
        .map-controls { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
        .map-btn {
            background: #f5a623;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .notify-btn {
            width: 100%;
            padding: 14px;
            background: #f5a623;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .notify-btn.enabled { background: #2ecc71; color: white; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #f5a623;
            color: #1a2332;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading { text-align: center; padding: 40px; color: #f5a623; }
        
        @media (max-width: 600px) {
            .title { font-size: 38px; }
            .temp-value { font-size: 56px; }
            .location-name { font-size: 28px; }
            .details-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 class="title">Weather<span class="title-tiff">Tiff</span></h1>
                <p class="subtitle">FLORIDA WEATHER INTELLIGENCE</p>
            </div>
            <button class="mode-toggle" id="stormModeBtn" onclick="toggleStormMode()">🌪️ STORM MODE</button>
        </div>
        
        <div class="locations-panel">
            <div class="locations-title">📍 MY LOCATIONS</div>
            <div class="locations-buttons" id="locationBtns"></div>
            <input type="text" id="cityInput" class="add-input" placeholder="Add Florida city (Miami, Orlando, Tampa...)">
        </div>
        
        <div id="weatherContent">
            <div class="loading">🌤️ Loading weather data...</div>
        </div>
    </div>
    
    <script>
        // ========== CONFIGURATION ==========
        let currentLocation = { name: "Brooksville", lat: 28.555, lon: -82.387, state: "FL" };
        let locations = [];
        let stormMode = false;
        let map = null;
        let mapType = "standard";
        let notificationsOn = false;
        
        // Florida cities database (real coordinates)
        const floridaCities = {
            "brooksville": { name: "Brooksville", lat: 28.555, lon: -82.387, state: "FL" },
            "tampa": { name: "Tampa", lat: 27.9506, lon: -82.4572, state: "FL" },
            "orlando": { name: "Orlando", lat: 28.5383, lon: -81.3792, state: "FL" },
            "miami": { name: "Miami", lat: 25.7617, lon: -80.1918, state: "FL" },
            "jacksonville": { name: "Jacksonville", lat: 30.3322, lon: -81.6557, state: "FL" },
            "st petersburg": { name: "St Petersburg", lat: 27.7676, lon: -82.6403, state: "FL" },
            "fort lauderdale": { name: "Fort Lauderdale", lat: 26.1224, lon: -80.1433, state: "FL" },
            "west palm beach": { name: "West Palm Beach", lat: 26.7153, lon: -80.0534, state: "FL" },
            "sarasota": { name: "Sarasota", lat: 27.3364, lon: -82.5307, state: "FL" },
            "naples": { name: "Naples", lat: 26.142, lon: -81.7948, state: "FL" },
            "tallahassee": { name: "Tallahassee", lat: 30.4383, lon: -84.2807, state: "FL" },
            "gainesville": { name: "Gainesville", lat: 29.6516, lon: -82.3248, state: "FL" }
        };
        
        // ========== STORAGE ==========
        function saveLocations() {
            localStorage.setItem("weatherTiffLocations", JSON.stringify(locations));
        }
        
        function loadLocations() {
            const saved = localStorage.getItem("weatherTiffLocations");
            if (saved) {
                locations = JSON.parse(saved);
                if (locations.length > 0) currentLocation = locations[0];
            } else {
                locations = [floridaCities["brooksville"]];
                currentLocation = locations[0];
            }
            updateLocationButtons();
        }
        
        // ========== TOAST ==========
        function showToast(message) {
            const existing = document.querySelector(".toast");
            if (existing) existing.remove();
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        // ========== LOCATION SEARCH ==========
        function addLocation() {
            const input = document.getElementById("cityInput");
            const query = input.value.toLowerCase().trim();
            if (!query) return;
            
            if (floridaCities[query]) {
                const newLoc = floridaCities[query];
                if (!locations.some(l => l.name === newLoc.name)) {
                    locations.push(newLoc);
                    saveLocations();
                    updateLocationButtons();
                    showToast(`✅ Added ${newLoc.name}`);
                    input.value = "";
                } else {
                    showToast(`📍 ${newLoc.name} already in your list`);
                }
            } else {
                showToast(`❌ City not found. Try: Tampa, Miami, Orlando, Jacksonville`);
            }
        }
        
        function switchLocation(idx) {
            currentLocation = locations[idx];
            updateLocationButtons();
            fetchAllWeather();
            if (map) map.setView([currentLocation.lat, currentLocation.lon], 8);
            showToast(`📍 ${currentLocation.name}`);
        }
        
        function updateLocationButtons() {
            let html = "";
            locations.forEach((loc, idx) => {
                const active = loc.name === currentLocation.name;
                html += `<button class="loc-btn ${active ? 'active' : 'inactive'}" onclick="switchLocation(${idx})">${loc.name}</button>`;
            });
            document.getElementById("locationBtns").innerHTML = html;
        }
        
        // ========== WEATHER API (REAL DATA) ==========
        async function fetchWeather() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&temperature_unit=fahrenheit`;
                const res = await fetch(url);
                const data = await res.json();
                return data;
            } catch (e) {
                console.error("Weather fetch error:", e);
                return null;
            }
        }
        
        async function fetchAirQuality() {
            try {
                const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current=us_aqi,pm10,pm2_5`;
                const res = await fetch(url);
                const data = await res.json();
                return data;
            } catch (e) {
                return null;
            }
        }
        
        async function fetchNOAAAlerts() {
            try {
                const url = `https://api.weather.gov/alerts/active?point=${currentLocation.lat},${currentLocation.lon}`;
                const res = await fetch(url);
                const data = await res.json();
                return data;
            } catch (e) {
                return null;
            }
        }
        
        // ========== UV INDEX LABEL ==========
        function getUVLabel(uv) {
            if (uv <= 2) return "Low";
            if (uv <= 5) return "Moderate";
            if (uv <= 7) return "High";
            if (uv <= 10) return "Very High";
            return "Extreme";
        }
        
        // ========== WEATHER ICON ==========
        function getWeatherIcon(code) {
            const icons = {
                0: "☀️", 1: "⛅", 2: "⛅", 3: "☁️", 45: "🌫️", 61: "🌧️", 63: "🌧️", 65: "🌧️",
                71: "❄️", 80: "🌧️", 95: "⛈️", 96: "⛈️", 99: "⛈️"
            };
            return icons[code] || "🌡️";
        }
        
        function getCondition(code) {
            const conditions = {
                0: "Clear skies", 1: "Mostly clear", 2: "Partly cloudy", 3: "Overcast",
                45: "Foggy", 61: "Rain", 63: "Rain", 65: "Heavy rain",
                71: "Snow", 80: "Rain showers", 95: "Thunderstorm", 96: "Thunderstorm", 99: "Severe storm"
            };
            return conditions[code] || "Variable";
        }
        
        // ========== RENDER WEATHER UI ==========
        async function fetchAllWeather() {
            document.getElementById("weatherContent").innerHTML = '<div class="loading">🌤️ Loading weather data...</div>';
            
            const weather = await fetchWeather();
            const airQuality = await fetchAirQuality();
            
            if (!weather) {
                document.getElementById("weatherContent").innerHTML = '<div class="loading">⚠️ Unable to load weather data</div>';
                return;
            }
            
            const current = weather.current;
            const daily = weather.daily;
            
            // Calculate feels like
            const feels
