<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>WeatherTiff - Premium Weather Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Open Sans',sans-serif;
background:linear-gradient(135deg,#14071f 0%,#24123d 40%,#372257 70%,#22143d 100%);
color:#fff;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

.container{
max-width:760px;
margin:auto;
}

.header{
position:relative;
margin-bottom:25px;
padding-top:20px;
overflow:hidden;
}

.floating-cloud{
position:absolute;
top:55px;
left:-180px;
font-size:90px;
opacity:.75;
pointer-events:none;
animation:cloudDrift 22s linear infinite;
z-index:1;
}

@keyframes cloudDrift{
0%{transform:translateX(0);}
100%{transform:translateX(950px);}
}

.title{
font-size:62px;
font-weight:800;
font-family:'Playfair Display',serif;
position:relative;
z-index:5;
letter-spacing:-2px;
}

.title span{
font-family:'Great Vibes',cursive;
font-size:1.2em;
color:#d4a574;
font-weight:400;
text-shadow:0 0 20px rgba(212,165,116,.4);
}

.subtitle{
letter-spacing:5px;
font-size:11px;
margin-top:6px;
color:#ceb7ff;
position:relative;
z-index:5;
}

.dark-toggle{
position:absolute;
right:0;
top:10px;
border:none;
border-radius:30px;
padding:10px 18px;
background:rgba(212,165,116,.18);
color:#d4a574;
cursor:pointer;
font-weight:700;
backdrop-filter:blur(20px);
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,.12);
box-shadow:
0 8px 32px rgba(0,0,0,.25),
inset 0 1px 0 rgba(255,255,255,.08);
border-radius:24px;
}

.locations-panel{
padding:18px;
margin-bottom:18px;
}

.locations-title{
font-size:12px;
font-weight:700;
letter-spacing:2px;
margin-bottom:12px;
color:#d4a574;
}

.locations-buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:12px;
}

.loc-btn{
padding:8px 16px;
border-radius:30px;
cursor:pointer;
font-weight:700;
border:none;
}

.loc-btn.active{
background:#d4a574;
color:#1a2332;
}

.loc-btn.inactive{
background:transparent;
color:#d4a574;
border:1px solid #d4a574;
}

.address-input{
width:100%;
padding:14px;
border-radius:40px;
border:1px solid rgba(212,165,116,.4);
background:rgba(255,255,255,.08);
color:white;
outline:none;
margin-bottom:10px;
}

.gps-btn{
width:100%;
padding:14px;
border:none;
border-radius:40px;
background:#d4a574;
color:#1a2332;
font-weight:800;
cursor:pointer;
}

.card{
padding:24px;
margin-bottom:18px;
}

.location{
font-size:40px;
font-family:'Playfair Display',serif;
font-weight:800;
}

.temp{
font-size:88px;
line-height:1;
font-family:'Playfair Display',serif;
font-weight:900;
}

.condition{
margin-top:6px;
color:#dfeeff;
}

.details{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:20px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,.1);
}

.detail{
text-align:center;
}

.label{
font-size:10px;
letter-spacing:1px;
color:#d4a574;
font-weight:700;
margin-bottom:5px;
}

.value{
font-size:15px;
font-weight:700;
}

.radar{
height:350px;
overflow:hidden;
border-radius:20px;
border:1px solid rgba(255,255,255,.12);
}

.radar iframe{
width:100%;
height:100%;
border:none;
}

.forecast{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:15px;
}

.day-card{
padding:12px 6px;
border-radius:14px;
text-align:center;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
}

.day{
font-size:11px;
color:#d4a574;
font-weight:700;
}

.icon{
font-size:24px;
margin:5px 0;
}

.high{
font-weight:700;
}

.low{
font-size:11px;
opacity:.75;
}

#weatherContent{
margin-top:18px;
}

.loading{
text-align:center;
padding:70px;
color:#d4a574;
}

.toast{
position:fixed;
left:20px;
right:20px;
bottom:20px;
padding:14px;
background:#d4a574;
color:#1a2332;
font-weight:700;
border-radius:40px;
text-align:center;
z-index:9999;
}

@media(max-width:600px){

.title{
font-size:46px;
}

.temp{
font-size:70px;
}

.details{
grid-template-columns:repeat(2,1fr);
}

.forecast{
grid-template-columns:repeat(4,1fr);
}

.dark-toggle{
position:relative;
margin-top:10px;
}

}

</style>

</head>
<body>

<div class="container">

<div class="header">

<div class="floating-cloud">☁️</div>

<div class="title">
Weather<span>Tiff</span>
</div>

<div class="subtitle">
PREMIUM WEATHER INTELLIGENCE
</div>

<button class="dark-toggle" onclick="toggleDarkMode()">
🌙 Dark
</button>

</div>

<div class="locations-panel glass">

<div class="locations-title">
📍 MY LOCATIONS
</div>

<div class="locations-buttons" id="locationBtns"></div>

<input
id="addressInput"
class="address-input"
placeholder="Enter city or address">

<button class="gps-btn" onclick="findMe()">
📍 FIND ME
</button>

</div>

<div id="weatherContent">
<div class="loading">
Loading WeatherTiff...
</div>
</div>

</div>
