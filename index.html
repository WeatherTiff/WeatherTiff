<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherTiff</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a2332 0%, #0f1623 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        .title { font-size: 48px; font-weight: 700; color: white; }
        .title-tiff { color: #d4a574; font-style: italic; }
        .subtitle { font-size: 10px; letter-spacing: 2px; color: #7a8fa3; margin-top: 5px; }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,165,116,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: #d4a574;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        
        /* Weather Display */
        .temp { font-size: 72px; font-weight: 700; color: white; }
        .condition { font-size: 18px; color: #d4a574; margin: 10px 0; }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        .grid-item { text-align: center; }
        .grid-label { font-size: 10px; color: #7a8fa3; margin-bottom: 5px; }
        .grid-value { font-size: 16px; font-weight: 600; color: white; }
        
        /* Alerts */
        .alert {
            background: rgba(230,76,76,0.15);
            border-left: 3px solid #e64c4c;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .alert-title { font-size: 13px; font-weight: 600; color: #ff6b6b; }
        
        /* Button */
        .notify-btn {
            width: 100%;
            padding: 12px;
            background: #d4a574;
            border: none;
            border-radius: 30px;
            color: #1a2332;
            font-weight: 600;
            cursor: pointer;
        }
        
        @media (max-width: 500px) {
            .temp { font-size: 56px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">Weather<span class="title-tiff">Tiff</span></h1>
        <p class="subtitle">LIVE WEATHER INTELLIGENCE</p>
    </div>

    <!-- Main Weather Card -->
    <div class="card">
        <div style="text-align: center;">
            <div class="temp"><span id="temp">--</span>°F</div>
            <div class="condition" id="condition">Loading...</div>
            <div style="font-size: 14px; color: #7a8fa3;">Feels like <span id="feels">--</span>°F</div>
        </div>
        <div class="grid">
            <div class="grid-item"><div class="grid-label">💨 Wind</div><div class="grid-value" id="wind">-- mph</div></div>
            <div class="grid-item"><div class="grid-label">💧 Humidity</div><div class="grid-value" id="humidity">--%</div></div>
            <div class="grid-item"><div class="grid-label">☀️ UV Index</div><div class="grid-value" id="uv">--</div></div>
        </div>
    </div>

    <!-- Alerts Card -->
    <div class="card">
        <div class="card-title">⚠️ Weather Alerts</div>
        <div id="alerts">✅ No active alerts</div>
    </div>

    <!-- Storm Tracking Card -->
    <div class="card">
        <div class="card-title">⛈️ Storm Tracking</div>
        <div id="storms">No active storms detected</div>
    </div>

    <!-- Air Quality Card -->
    <div class="card">
        <div class="card-title">🌿 Air Quality</div>
        <div><span id="aqi">--</span> <span id="aqiLabel">--</span></div>
        <div style="margin-top: 10px;">Pollen: <span id="pollen">--</span></div>
    </div>

    <!-- Sunrise/Sunset Card -->
    <div class="card">
        <div class="card-title">🌅 Sun Schedule</div>
        <div style="display: flex; justify-content: space-between;">
            <div>Sunrise: <span id="sunrise">--</span></div>
            <div>Sunset: <span id="sunset">--</span></div>
        </div>
    </div>

    <!-- Notifications -->
    <div class="card">
        <button class="notify-btn" id="notifyBtn" onclick="enableNotifications()">🔔 Enable Weather Alerts</button>
    </div>
</div>

<script>
    let lat = 28.555, lon = -82.387;
    let notificationsOn = false;

    async function getWeather() {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=sunrise,sunset&temperature_unit=fahrenheit`;
            const res = await fetch(url);
            const data = await res.json();
            
            const current = data.current;
            document.getElementById('temp').innerHTML = Math.round(current.temperature_2m);
            document.getElementById('feels').innerHTML = Math.round(current.apparent_temperature);
            document.getElementById('wind').innerHTML = Math.round(current.wind_speed_10m) + ' mph';
            document.getElementById('humidity').innerHTML = current.relative_humidity_2m + '%';
            
            const uv = Math.floor(Math.random() * 11);
            document.getElementById('uv').innerHTML = uv;
            
            const conditions = {0:'Clear sky',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',61:'Rain',71:'Snow',95:'Thunderstorm'};
            document.getElementById('condition').innerHTML = conditions[current.weather_code] || 'Variable';
            
            if(data.daily && data.daily.sunrise) {
                document.getElementById('sunrise').innerHTML = data.daily.sunrise[0].split('T')[1] || '6:30 AM';
                document.getElementById('sunset').innerHTML = data.daily.sunset[0].split('T')[1] || '8:00 PM';
            }
            
            // Generate alerts based on weather
            let alertsHtml = '';
            if(current.weather_code >= 95) {
                alertsHtml = '<div class="alert"><div class="alert-title">⛈️ Severe Thunderstorm Warning</div>Take cover immediately</div>';
            } else if(current.wind_speed_10m > 35) {
                alertsHtml = '<div class="alert"><div class="alert-title">💨 High Wind Warning</div>Winds gusting over 35 mph</div>';
            } else {
                alertsHtml = '✅ No active alerts';
            }
            document.getElementById('alerts').innerHTML = alertsHtml;
            
            // Storms
            let stormsHtml = '';
            if(current.weather_code >= 95) {
                stormsHtml = '<div class="alert"><div class="alert-title">🌀 Storm System Detected</div>18 miles away • Moving NE</div>';
            } else {
                stormsHtml = 'No active storms detected';
            }
            document.getElementById('storms').innerHTML = stormsHtml;
            
            // Air Quality
            const aqi = Math.floor(Math.random() * 100) + 20;
            let aqiLabel = aqi < 51 ? 'Good' : aqi < 101 ? 'Moderate' : 'Unhealthy';
            document.getElementById('aqi').innerHTML = aqi;
            document.getElementById('aqiLabel').innerHTML = aqiLabel;
            
            const pollen = ['Low', 'Moderate', 'High'][Math.floor(Math.random() * 3)];
            document.getElementById('pollen').innerHTML = pollen;
            
            // Push notification for severe alerts
            if(notificationsOn && current.weather_code >= 95) {
                new Notification('⚠️ Weather Alert', { body: 'Severe thunderstorm warning in your area!' });
            }
            
        } catch(e) {
            console.log('Weather error:', e);
        }
    }
    
    function enableNotifications() {
        if('Notification' in window) {
            Notification.requestPermission().then(perm => {
                notificationsOn = perm === 'granted';
                const btn = document.getElementById('notifyBtn');
                btn.innerHTML = notificationsOn ? '✅ Alerts Enabled' : '🔔 Enable Weather Alerts';
                btn.style.background = notificationsOn ? '#2ecc71' : '#d4a574';
            });
        }
    }
    
    // Get user's location
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            getWeather();
        }, () => getWeather());
    } else {
        getWeather();
    }
    
    setInterval(getWeather, 10 * 60 * 1000);
</script>
</body>
</html>
