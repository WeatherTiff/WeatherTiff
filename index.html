<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherTiff - Premium Weather Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Open Sans',sans-serif;
background:linear-gradient(135deg,#2d1b4e 0%,#3d2a5f 35%,#4a3570 70%,#2d1b4e 100%);
color:white;
padding:20px;
min-height:100vh;
overflow-x:hidden;
}

.container{
max-width:700px;
margin:auto;
}

.header{
position:relative;
margin-bottom:25px;
}

.cloud{
position:absolute;
top:48px;
left:-20px;
width:150px;
opacity:.6;
animation:cloudFloat 18s linear infinite;
z-index:20;
}

@keyframes floatCloud{
0%{transform:translateX(0);}
50%{transform:translateX(25px);}
100%{transform:translateX(0);}
}

.title{
font-size:56px;
font-family:'Playfair Display',serif;
font-weight:800;
}

.title span{
color:#d4a574;
font-style:italic;
font-weight:400;
}

.subtitle{
letter-spacing:3px;
font-size:11px;
margin-top:8px;
color:#cdb7ff;
}

.card{
background:rgba(255,255,255,.07);
backdrop-filter:blur(18px);
border:1px solid rgba(212,165,116,.25);
border-radius:24px;
padding:24px;
margin-bottom:18px;
}

.location{
font-size:40px;
font-family:'Playfair Display',serif;
font-weight:800;
}

.temp{
font-size:82px;
font-family:'Playfair Display',serif;
font-weight:800;
line-height:1;
}

.condition{
margin-top:6px;
color:#dfeeff;
}

.details{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.detail{
text-align:center;
}

.label{
font-size:10px;
color:#d4a574;
letter-spacing:1px;
margin-bottom:5px;
}

.value{
font-size:17px;
font-weight:700;
}

.radar{
width:100%;
height:320px;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(212,165,116,.25);
}

.radar iframe{
width:100%;
height:100%;
border:none;
}

.forecast{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:15px;
}

.day-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(212,165,116,.2);
padding:10px 5px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:.25s;
}

.day-card:hover{
transform:translateY(-2px);
}

.day-card.active{
border:2px solid #d4a574;
background:rgba(212,165,116,.2);
}

.day{
font-size:11px;
color:#d4a574;
margin-bottom:5px;
}

.icon{
font-size:22px;
}

.high{
font-weight:700;
}

.low{
font-size:11px;
color:#bcbcbc;
}

.forecast-detail{
margin-top:15px;
padding:15px;
border-radius:14px;
background:rgba(212,165,116,.08);
display:none;
}

.loading{
text-align:center;
padding:60px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<svg class="cloud" viewBox="0 0 200 100">
<ellipse cx="80" cy="40" rx="35" ry="20" fill="white"/>
<ellipse cx="50" cy="50" rx="30" ry="18" fill="white"/>
<ellipse cx="110" cy="50" rx="30" ry="18" fill="white"/>
</svg>

<div class="title">
Weather<span>Tiff</span>
</div>

<div class="subtitle">
PREMIUM WEATHER INTELLIGENCE
</div>

</div>

<div id="weather"></div>

</div>

<script>

const LAT=28.5655;
const LON=-82.4007;

const icons={
0:"☀️",
1:"🌤️",
2:"⛅",
3:"☁️",
45:"🌫️",
48:"🌫️",
51:"🌦️",
53:"🌦️",
55:"🌦️",
61:"🌧️",
63:"🌧️",
65:"🌧️",
71:"❄️",
80:"🌦️",
81:"🌧️",
82:"🌧️",
95:"⛈️",
96:"⛈️",
99:"⛈️"
};

async function loadWeather(){

const res=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&temperature_unit=fahrenheit`
);

const data=await res.json();

const current=data.current;
const daily=data.daily;

let forecastHTML='';

for(let i=0;i<7;i++){

forecastHTML+=`
<div class="day-card"
onclick="showDay(${i})"
id="day${i}">
<div class="day">
${new Date(Date.now()+i*86400000).toLocaleDateString('en-US',{weekday:'short'})}
</div>

<div class="icon">
${icons[daily.weather_code[i]]||'🌤️'}
</div>

<div class="high">
${Math.round(daily.temperature_2m_max[i])}°
</div>

<div class="low">
${Math.round(daily.temperature_2m_min[i])}°
</div>
</div>`;
}

document.getElementById('weather').innerHTML=`

<div class="card">

<div class="location">Brooksville</div>

<div class="temp">
${Math.round(current.temperature_2m)}°
</div>

<div class="condition">
Feels like ${Math.round(current.apparent_temperature)}°
</div>

<div class="details">

<div class="detail">
<div class="label">WIND</div>
<div class="value">${Math.round(current.wind_speed_10m)} mph</div>
</div>

<div class="detail">
<div class="label">HUMIDITY</div>
<div class="value">${current.relative_humidity_2m}%</div>
</div>

<div class="detail">
<div class="label">CONDITION</div>
<div class="value">${icons[current.weather_code]||'🌤️'}</div>
</div>

</div>

</div>

<div class="card">
<h3 style="margin-bottom:15px;color:#d4a574;">🗺 Radar Map</h3>

<div class="radar">
<iframe
src="https://embed.windy.com/embed2.html?lat=28.56&lon=-82.40&detailLat=28.56&detailLon=-82.40&zoom=7&level=surface&overlay=radar">
</iframe>
</div>
</div>

<div class="card">

<h3 style="margin-bottom:15px;color:#d4a574;">
📈 7 Day Forecast
</h3>

<div class="forecast">
${forecastHTML}
</div>

<div class="forecast-detail" id="forecastDetail"></div>

</div>
`;
}

function showDay(i){

document.querySelectorAll('.day-card')
.forEach(card=>card.classList.remove('active'));

document.getElementById('day'+i)
.classList.add('active');

const detail=document.getElementById('forecastDetail');

detail.style.display='block';

detail.innerHTML=`
<h3>Forecast Day ${i+1}</h3>
<p style="margin-top:8px;">
Detailed forecast selected.
</p>
`;
}

loadWeather();

</script>

</body>
</html>
