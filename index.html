<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WeatherTiff Pro - Advanced Weather Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a2a5f 0%, #2d3e7f 50%, #1f3a6f 100%);
            min-height: 100vh;
            font-family: 'Open Sans', sans-serif;
            color: #ffffff;
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
        }

        /* REALISTIC TRANSLUCENT CLOUDS */
        .cloud-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.25;
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 56px;
            font-weight: 800;
            color: white;
            letter-spacing: -2px;
            font-family: 'Playfair Display', serif;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }

        .title-tiff { 
            color: #ffb366;
            font-style: italic;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 3px;
            color: #b8d0ff;
            margin: 8px 0 0;
            font-weight: 600;
        }

        .mode-toggle {
            padding: 8px 20px;
            background: linear-gradient(135deg, #ffb366, #ff8833);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,136,51,0.3);
            transition: all 0.3s;
            height: fit-content;
        }

        .mode-toggle:hover { transform: scale(1.02); }
        .mode-toggle.active { background: linear-gradient(135deg, #ff5555, #dd0000); }

        .locations-panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,179,102,0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .locations-title {
            font-size: 12px;
            color: #ffb366;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .locations-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .loc-btn {
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .loc-btn.active { 
            background: linear-gradient(135deg, #ffb366, #ff8833);
            color: white;
            box-shadow: 0 2px 8px rgba(255,136,51,0.3);
        }
        
        .loc-btn.inactive { 
            background: rgba(255,179,102,0.15);
            border: 1px solid #ffb366;
            color: #ffb366;
        }

        .add-location-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255,179,102,0.5);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 13px;
        }

        .add-location-input::placeholder { color: rgba(255,179,102,0.7); }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,179,102,0.3);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }

        .card:hover { border-color: #ffb366; background: rgba(255,255,255,0.1); }

        .card-title {
            font-size: 11px;
            letter-spacing: 2px;
            color: #ffb366;
            margin-bottom: 16px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .location-name {
            font-size: 42px;
            font-weight: 800;
            color: white;
            font-family: 'Playfair Display', serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .location-info {
            font-size: 11px;
            letter-spacing: 2px;
            color: #ffb366;
            margin-top: 5px;
            font-weight: 600;
        }

        .weather-icon { font-size: 56px; filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3)); }

        .weather-section {
            border-top: 1px solid rgba(255,179,102,0.2);
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .temperature-display {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 12px;
        }

        .temp-value {
            font-size: 84px;
            font-weight: 800;
            color: white;
            line-height: 0.95;
            font-family: 'Playfair Display', serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .temp-unit { font-size: 28px; color: #ffb366; font-weight: 600; }
        .condition { font-size: 15px; color: #cce5ff; margin-top: 5px; font-weight: 500; }
        .feels-like { font-size: 12px; color: #99ccff; margin-top: 5px; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            border-top: 1px solid rgba(255,179,102,0.2);
            padding-top: 16px;
        }

        .detail-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #ffb366;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .detail-value { font-size: 16px; font-weight: 700; color: white; }

        .extended-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
            border-top: 1px solid rgba(255,179,102,0.2);
            padding-top: 16px;
        }

        .radar-container {
            width: 100%;
            height: 220px;
            background: radial-gradient(circle, rgba(100,150,255,0.2) 0%, transparent 70%);
            border: 1px solid rgba(255,179,102,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .radar-ring {
            position: absolute;
            border: 1px solid rgba(255,179,102,0.2);
            border-radius: 50%;
        }

        .radar-center {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffb366;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffb366;
        }

        .radar-text {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffb366;
            font-size: 13px;
            font-weight: 600;
        }

        .trends-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .trend-card {
            background: rgba(255,255,255,0.05);
            padding: 10px 5px;
            border-radius: 12px;
            border: 1px solid rgba(255,179,102,0.2);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .trend-card:hover { background: rgba(255,179,102,0.15); transform: translateY(-2px); }
        .trend-day { font-size: 10px; color: #ffb366; margin-bottom: 5px; font-weight: 600; }
        .trend-high { font-size: 14px; font-weight: 700; color: white; }
        .trend-low { font-size: 10px; color: #99ccff; margin-top: 3px; }

        .alert-item {
            background: rgba(255,179,102,0.1);
            border-left: 4px solid #ffb366;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .alert-item:hover { background: rgba(255,179,102,0.2); transform: translateX(5px); }
        .alert-critical { background: rgba(255,85,85,0.15); border-left-color: #ff6666; }
        .alert-title { font-size: 12px; font-weight: 800; color: #ffb366; }
        .alert-critical .alert-title { color: #ff8888; }

        .storm-item {
            background: rgba(255,179,102,0.1);
            border-left: 4px solid #ffb366;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .storm-item:hover { background: rgba(255,179,102,0.2); transform: translateX(5px); }
        .storm-name { font-size: 13px; font-weight: 700; color: #ffb366; }
        .storm-info { font-size: 11px; color: #cce5ff; margin-top: 4px; }

        .no-alerts { text-align: center; color: #99ccff; padding: 20px; font-size: 13px; }

        .notification-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffb366, #ff8833);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .notification-btn:hover { transform: scale(1.01); }
        .notification-btn.enabled { background: linear-gradient(135deg, #66dd99, #44aa66); }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffb366, #ff8833);
            color: white;
            padding: 14px 20px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading { text-align: center; padding: 60px 20px; color: #ffb366; font-size: 14px; font-weight: 600; }

        .search-suggestions {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            display: none;
            border: 1px solid rgba(255,179,102,0.3);
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,179,102,0.2);
            color: white;
            font-size: 12px;
        }

        .suggestion-item:hover { background: rgba(255,179,102,0.2); }

        @media (max-width: 600px) {
            .title { font-size: 42px; }
            .location-name { font-size: 32px; }
            .temp-value { font-size: 64px; }
        }
    </style>
</head>
<body>
    <!-- REALISTIC TRANSLUCENT CLOUDS -->
    <div class="cloud-bg">
        <svg viewBox="0 0 1200 800" preserveAspectRatio="none">
            <defs>
                <filter id="blur">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
                </filter>
            </defs>
            
            <!-- Animated clouds -->
            <g opacity="0.6" filter="url(#blur)">
                <ellipse cx="100" cy="150" rx="80" ry="40" fill="white" opacity="0.7">
                    <animate attributeName="cx" from="-100" to="1300" dur="25s" repeatCount="indefinite"/>
                </ellipse>
                <ellipse cx="180" cy="140" rx="100" ry="50" fill="white" opacity="0.5">
                    <animate attributeName="cx" from="-120" to="1320" dur="30s" repeatCount="indefinite"/>
                </ellipse>
            </g>
            
            <g opacity="0.5" filter="url(#blur)">
                <ellipse cx="200" cy="400" rx="120" ry="50" fill="white" opacity="0.6">
                    <animate attributeName="cx" from="-150" to="1350" dur="35s" repeatCount="indefinite"/>
                </ellipse>
                <ellipse cx="300" cy="390" rx="100" ry="45" fill="white" opacity="0.4">
                    <animate attributeName="cx" from="-100" to="1300" dur="40s" repeatCount="indefinite"/>
                </ellipse>
            </g>
            
            <g opacity="0.4" filter="url(#blur)">
                <ellipse cx="150" cy="650" rx="140" ry="60" fill="white" opacity="0.5">
                    <animate attributeName="cx" from="-200" to="1400" dur="45s" repeatCount="indefinite"/>
                </ellipse>
                <ellipse cx="280" cy="680" rx="110" ry="50" fill="white" opacity="0.3">
                    <animate attributeName="cx" from="-120" to="1320" dur="50s" repeatCount="indefinite"/>
                </ellipse>
            </g>
        </svg>
    </div>

    <div class="container">
        <div class="header-section">
            <div>
                <h1 class="title">Weather<span class="title-tiff">Tiff</span></h1>
                <p class="subtitle">PREMIUM WEATHER INTELLIGENCE</p>
            </div>
            <button class="mode-toggle" id="stormBtn" onclick="toggleStormMode()">⛈️ STORM MODE</button>
        </div>
        
        <div class="locations-panel">
            <div class="locations-title">📍 MY LOCATIONS</div>
            <div class="locations-buttons" id="locationBtns"></div>
            <input type="text" id="addressInput" class="add-location-input" placeholder="Enter address or city (e.g., Tampa, FL)" onkeyup="searchAddress(this.value)" onkeypress="handleAddressKeypress(event)">
            <div id="suggestions" class="search-suggestions"></div>
        </div>
        
        <div id="content">
            <div class="loading">🌤️ Loading real weather data...</div>
        </div>
    </div>
    
    <script>
        let savedLocs = [];
        let currentLoc = null;
        let stormActive = false;
        let notifOn = false;

        const defaultLocs = [
            { name: "Brooksville", lat: 28.5655, lon: -82.4007, fullName: "Brooksville, Florida, USA" },
            { name: "Tampa", lat: 27.9506, lon: -82.4572, fullName: "Tampa, Florida, USA" },
            { name: "Orlando", lat: 28.5383, lon: -81.3792, fullName: "Orlando, Florida, USA" },
            { name: "Miami", lat: 25.7617, lon: -80.1918, fullName: "Miami, Florida, USA" }
        ];

        function saveToStorage() {
            localStorage.setItem("wtLocs", JSON.stringify(savedLocs));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem("wtLocs");
            if (saved && JSON.parse(saved).length > 0) {
                savedLocs = JSON.parse(saved);
                currentLoc = savedLocs[0];
            } else {
                savedLocs = [...defaultLocs];
                currentLoc = savedLocs[0];
                saveToStorage();
            }
            updateButtons();
        }

        let searchTimeout;

        async function searchAddress(query) {
            const suggestionsDiv = document.getElementById('suggestions');
            if (!query.trim() || query.length < 3) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1&countrycodes=us`;
                    const response = await fetch(url, {
                        headers: { 'User-Agent': 'WeatherTiff/1.0' }
                    });
                    const data = await response.json();
                    
                    if (data.length > 0) {
                        suggestionsDiv.innerHTML = data.map(item => `
                            <div class="suggestion-item" onclick="selectAddress('${item.lat}', '${item.lon}', '${item.display_name.replace(/'/g, "\\'")}')">
                                📍 ${item.display_name.substring(0, 60)}
                            </div>
                        `).join('');
                        suggestionsDiv.style.display = 'block';
                    } else {
                        suggestionsDiv.style.display = 'none';
                    }
                } catch(e) {
                    console.log('Search error:', e);
                }
            }, 500);
        }

        function selectAddress(lat, lon, name) {
            document.getElementById('addressInput').value = name;
            document.getElementById('suggestions').style.display = 'none';
            
            const newLoc = { name: name.split(',')[0], lat: parseFloat(lat), lon: parseFloat(lon), fullName: name };
            
            if (!savedLocs.some(l => l.name === newLoc.name)) {
                savedLocs.push(newLoc);
                saveToStorage();
                updateButtons();
                showMessage(`✅ Added ${newLoc.name}`);
                currentLoc = newLoc;
                loadAllWeather();
                updateButtons();
            } else {
                currentLoc = savedLocs.find(l => l.name === newLoc.name);
                loadAllWeather();
                updateButtons();
            }
        }

        function handleAddressKeypress(e) {
            if (e.key === 'Enter') {
                document.getElementById('suggestions').style.display = 'none';
                const query = e.target.value;
                if (query) searchAndAddAddress(query);
            }
        }

        async function searchAndAddAddress(query) {
            try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&addressdetails=1&countrycodes=us`;
                const response = await fetch(url, {
                    headers: { 'User-Agent': 'WeatherTiff/1.0' }
                });
                const data = await response.json();
                
                if (data.length > 0) {
                    const item = data[0];
                    const newLoc = { name: item.display_name.split(',')[0], lat: parseFloat(item.lat), lon: parseFloat(item.lon), fullName: item.display_name };
                    
                    if (!savedLocs.some(l => l.name === newLoc.name)) {
                        savedLocs.push(newLoc);
                        saveToStorage();
                        updateButtons();
                        showMessage(`✅ Added ${newLoc.name}`);
                        currentLoc = newLoc;
                        loadAllWeather();
                        updateButtons();
                    }
                } else {
                    showMessage(`❌ Address not found.`);
                }
            } catch(e) {
                showMessage(`❌ Search error.`);
            }
        }

        function showMessage(msg) {
            let old = document.querySelector(".toast");
            if (old) old.remove();
            let toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateButtons() {
            let html = "";
            savedLocs.forEach((loc, i) => {
                let activeClass = currentLoc && loc.name === currentLoc.name ? "active" : "inactive";
                html += `<button class="loc-btn ${activeClass}" onclick="switchToLocation(${i})">${loc.name.length > 15 ? loc.name.substring(0,12)+'...' : loc.name}</button>`;
            });
            document.getElementById("locationBtns").innerHTML = html;
        }

        function switchToLocation(index) {
            currentLoc = savedLocs[index];
            updateButtons();
            loadAllWeather();
            showMessage(`📍 ${currentLoc.name}`);
        }

        async function getRealWeather() {
            try {
                let url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLoc.lat}&longitude=${currentLoc.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&temperature_unit=fahrenheit`;
                let resp = await fetch(url);
                if (!resp.ok) throw new Error('Weather API error');
                let data = await resp.json();
                if (!data.current) throw new Error('No current weather data');
                return data;
            } catch(e) {
                console.error('Weather error:', e);
                showMessage(`⚠️ Could not load weather. Retrying...`);
                return null;
            }
        }

        const iconMap = { 0:"☀️",1:"⛅",2:"⛅",3:"☁️",45:"🌫️",61:"🌧️",63:"🌧️",65:"🌧️",71:"❄️",80:"🌧️",95:"⛈️",99:"⛈️" };
        const descMap = { 0:"Clear skies",1:"Mostly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",61:"Rain",63:"Rain",65:"Heavy rain",71:"Snow",80:"Rain showers",95:"Thunderstorm",99:"Severe storm" };

        function toggleStormMode() {
            stormActive = !stormActive;
            let btn = document.getElementById("stormBtn");
            btn.classList.toggle("active");
            btn.innerText = stormActive ? "🌤️ STANDARD" : "⛈️ STORM MODE";
            showMessage(stormActive ? "⛈️ STORM CHASER ACTIVE" : "🌤️ Standard mode");
            loadAllWeather();
        }

        async function loadAllWeather() {
            if (!currentLoc) {
                loadFromStorage();
            }
            document.getElementById("content").innerHTML = '<div class="loading">🌤️ Loading real weather from Open-Meteo...</div>';
            
            let weather = await getRealWeather();
            if (!weather) {
                setTimeout(() => loadAllWeather(), 2000);
                return;
            }
            
            let curr = weather.current;
            let daily = weather.daily;
            
            let sunrise = "6:42 AM", sunset = "8:31 PM";
            if (daily?.sunrise?.[0]) sunrise = daily.sunrise[0].split("T")[1]?.slice(0,5) || sunrise;
            if (daily?.sunset?.[0]) sunset = daily.sunset[0].split("T")[1]?.slice(0,5) || sunset;
            
            let uv = curr.uv_index ? Math.round(curr.uv_index) : 5;
            let icon = iconMap[curr.weather_code] || "🌡️";
            let desc = descMap[curr.weather_code] || "Variable";
            let temp = Math.round(curr.temperature_2m);
            let feels = Math.round(curr.apparent_temperature);
            let wind = Math.round(curr.wind_speed_10m);
            let humidity = curr.relative_humidity_2m;
            
            let alertsHtml = "";
            if (curr.weather_code >= 95) {
                alertsHtml = `<div class="alert-item alert-critical" onclick="showMessage('⚠️ SEVERE THUNDERSTORM WARNING!')"><div class="alert-title">⚠️ SEVERE THUNDERSTORM WARNING</div></div>`;
            } else if (wind > 35) {
                alertsHtml = `<div class="alert-item" onclick="showMessage('💨 High wind warning: ${wind} mph')"><div class="alert-title">💨 HIGH WIND WARNING - ${wind} mph</div></div>`;
            } else {
                alertsHtml = `<div class="no-alerts">✓ No severe weather alerts</div>`;
            }
            
            let stormsHtml = "";
            if (curr.weather_code >= 95 || stormActive) {
                stormsHtml = `<div class="storm-item"><div class="storm-name">⛈️ ACTIVE SYSTEM</div><div class="storm-info">Real-time monitoring enabled</div></div>`;
            } else {
                stormsHtml = `<div class="no-alerts">No active storms detected</div>`;
            }
            
            let trendsHtml = "";
            let days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
            for (let i = 0; i < 7 && i < daily.temperature_2m_max.length; i++) {
                let high = Math.round(daily.temperature_2m_max[i]);
                let low = Math.round(daily.temperature_2m_min[i]);
                trendsHtml += `<div class="trend-card"><div class="trend-day">${days[i]}</div><div class="trend-high">${high}°</div><div class="trend-low">${low}°</div></div>`;
            }
            
            let fullHtml = `
                <div class="card">
                    <div class="location-header">
                        <div>
                            <div class="location-name">${currentLoc.name}</div>
                            <div class="location-info">${currentLoc.fullName.split(',').slice(1,3).join(',').trim()}</div>
                        </div>
                        <div class="weather-icon">${icon}</div>
                    </div>
                    <div class="weather-section">
                        <div class="temperature-display">
                            <span class="temp-value">${temp}</span>
                            <span class="temp-unit">°F</span>
                        </div>
                        <div class="condition">${desc}</div>
                        <div class="feels-like">Feels like ${feels}°F</div>
                    </div>
                    <div class="details-grid">
                        <div><div class="detail-label">Wind</div><div class="detail-value">${wind} mph</div></div>
                        <div><div class="detail-label">Humidity</div><div class="detail-value">${humidity}%</div></div>
                        <div><div class="detail-label">UV Index</div><div class="detail-value">${uv}</div></div>
                    </div>
                    <div class="extended-details">
                        <div><div class="detail-label">Sunrise</div><div class="detail-value">${sunrise}</div></div>
                        <div><div class="detail-label">Sunset</div><div class="detail-value">${sunset}</div></div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">🗺️ Weather Radar</div>
                    <div class="radar-container">
                        <div class="radar-ring" style="width: 120px; height: 120px;"></div>
                        <div class="radar-ring" style="width: 80px; height: 80px;"></div>
                        <div class="radar-ring" style="width: 40px; height: 40px;"></div>
                        <div class="radar-center"></div>
                        <div class="radar-text">📡 Live Radar<br>${currentLoc.name}</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">⚠️ Advanced Alerts</div>
                    ${alertsHtml}
                </div>
                
                <div class="card">
                    <div class="card-title">⛈️ Storm Tracking</div>
                    ${stormsHtml}
                </div>
                
                <div class="card">
                    <div class="card-title">📈 7-Day Forecast</div>
                    <div class="trends-grid">${trendsHtml}</div>
                </div>
                
                <div class="card">
                    <button class="notification-btn" id="notifyBtn" onclick="enableNotifs()">🔔 Enable Weather Alerts</button>
                </div>
            `;
            
            document.getElementById("content").innerHTML = fullHtml;
        }

        function enableNotifs() {
            notifOn = !notifOn;
            let btn = document.getElementById("notifyBtn");
            if (btn) {
                btn.innerText = notifOn ? "✅ Alerts Enabled" : "🔔 Enable Weather Alerts";
                btn.classList.toggle("enabled");
            }
            if (notifOn && "Notification" in window) Notification.requestPermission();
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.locations-panel')) {
                document.getElementById('suggestions').style.display = 'none';
            }
        });

        loadFromStorage();
        loadAllWeather();
        setInterval(loadAllWeather, 600000);
    </script>
</body>
</html>
