<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WeatherTiff Pro - Advanced Weather Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #1a2332 0%, #0f1623 100%);
            min-height: 100vh;
            font-family: 'Open Sans', -apple-system, sans-serif;
            color: #e0e0e0;
            padding: 30px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            gap: 16px;
        }

        .title-group {
            flex: 1;
        }

        .title {
            font-size: 56px;
            font-weight: 700;
            margin: 0;
            color: white;
            letter-spacing: -2px;
            font-family: 'Playfair Display', serif;
        }

        .title-weather {
            font-weight: 700;
            font-style: normal;
        }

        .title-tiff {
            color: #d4a574;
            font-style: italic;
            font-weight: 400;
            font-family: 'Playfair Display', serif;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 2px;
            color: #7a8fa3;
            margin: 16px 0 0;
            font-style: italic;
            font-weight: 400;
        }

        .mode-toggle {
            padding: 8px 12px;
            background: #d4a574;
            color: #1a2332;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            height: fit-content;
        }

        .mode-toggle:hover {
            background: #e8b88f;
        }

        .mode-toggle.active {
            background: #e64c4c;
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .locations-panel {
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid #d4a574;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .locations-title {
            font-size: 12px;
            color: #d4a574;
            margin: 0 0 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .locations-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .loc-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .loc-btn.active {
            background: #d4a574;
            color: #1a2332;
        }

        .loc-btn.inactive {
            background: transparent;
            border: 1px solid #d4a574;
            color: #d4a574;
        }

        .add-location-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #d4a574;
            background: rgba(212, 165, 116, 0.05);
            color: white;
            font-size: 12px;
        }

        .add-location-input::placeholder {
            color: #7a8fa3;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2a3a4f;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #d4a574;
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: #d4a574;
            margin: 0 0 16px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .location-name {
            font-size: 42px;
            font-weight: 700;
            color: white;
            margin: 0;
            letter-spacing: -1px;
            font-family: 'Playfair Display', serif;
        }

        .location-info {
            font-size: 11px;
            letter-spacing: 2px;
            color: #7a8fa3;
            margin: 8px 0 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        .weather-icon {
            font-size: 52px;
        }

        .weather-section {
            border-top: 1px solid #2a3a4f;
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .temperature-display {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 12px;
        }

        .temp-value {
            font-size: 84px;
            font-weight: 700;
            color: white;
            line-height: 0.95;
            font-family: 'Playfair Display', serif;
        }

        .temp-unit {
            font-size: 28px;
            color: #d4a574;
            font-weight: 400;
        }

        .condition {
            font-size: 15px;
            color: #7a8fa3;
            margin: 0;
            font-weight: 400;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            border-top: 1px solid #2a3a4f;
            padding-top: 16px;
            margin-bottom: 0;
        }

        .detail-item {
            text-align: left;
        }

        .detail-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #7a8fa3;
            margin: 0 0 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .extended-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
            border-top: 1px solid #2a3a4f;
            padding-top: 16px;
        }

        .aq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .aq-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a3a4f;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .aq-card:hover {
            background: rgba(212, 165, 116, 0.1);
        }

        .aq-label {
            font-size: 10px;
            color: #7a8fa3;
            margin: 0 0 6px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .aq-value {
            font-size: 14px;
            font-weight: 700;
            color: #7fb069;
            margin: 0;
        }

        .map-container {
            background: #0f1623;
            border: 1px solid #2a3a4f;
            border-radius: 12px;
            height: 250px;
            overflow: hidden;
            position: relative;
        }
        #radarMap {
            height: 100%;
            width: 100%;
        }
        .map-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }
        .map-btn {
            background: #d4a574;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            cursor: pointer;
            color: #1a2332;
            font-weight: 600;
            transition: all 0.2s;
        }
        .map-btn:hover {
            background: #e8b88f;
        }

        .alert-item {
            background: rgba(212, 165, 116, 0.1);
            border-left: 3px solid #d4a574;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .alert-item:hover {
            background: rgba(212, 165, 116, 0.2);
        }

        .alert-critical {
            background: rgba(230, 76, 76, 0.15);
            border-left-color: #e64c4c;
        }

        .alert-title {
            font-size: 12px;
            font-weight: 700;
            color: #d4a574;
            margin: 0;
        }

        .alert-critical .alert-title {
            color: #ff6b6b;
        }

        .no-alerts {
            text-align: center;
            color: #7a8fa3;
            font-size: 13px;
            padding: 20px;
            font-weight: 400;
        }

        .storm-item {
            background: rgba(230, 76, 76, 0.1);
            border-left: 3px solid #e64c4c;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .storm-item:hover {
            background: rgba(230, 76, 76, 0.2);
        }

        .storm-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
            margin: 0;
        }

        .storm-info {
            font-size: 11px;
            color: #7a8fa3;
            margin: 4px 0 0;
        }

        .trends-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .trend-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a3a4f;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .trend-card:hover {
            background: rgba(212, 165, 116, 0.1);
            transform: translateY(-2px);
        }

        .trend-day {
            font-size: 10px;
            color: #7a8fa3;
            margin: 0 0 6px;
            font-weight: 600;
        }

        .trend-high {
            font-size: 14px;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .trend-low {
            font-size: 10px;
            color: #7a8fa3;
            margin: 4px 0 0;
        }

        .notification-btn {
            width: 100%;
            padding: 12px;
            background: #d4a574;
            color: #1a2332;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .notification-btn:hover {
            background: #e8b88f;
        }

        .notification-enabled {
            background: #7fb069;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #d4a574;
            color: #1a2332;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #d4a574;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 42px;
            }
            .location-name {
                font-size: 32px;
            }
            .temp-value {
                font-size: 64px;
            }
            .header-section {
                flex-direction: column;
            }
            .mode-toggle {
                width: 100%;
                text-align: center;
            }
            .trends-grid {
                gap: 4px;
            }
            .trend-card {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="title-group">
                <h1 class="title"><span class="title-weather">Weather</span><span class="title-tiff">Tiff</span></h1>
                <p class="subtitle">ATMOSPHERIC CONDITIONS / LIVE READINGS</p>
            </div>
            <button class="mode-toggle" id="modeToggle" onclick="toggleStormChaserMode()">⛈️ STORM CHASER MODE</button>
        </div>

        <div class="locations-panel">
            <p class="locations-title">📍 Manage Locations</p>
            <div class="locations-buttons" id="locationButtons"></div>
            <input type="text" id="newLocation" class="add-location-input" placeholder="Add new location..." onkeypress="handleLocationKeypress(event)">
        </div>

        <div id="mainContent">
            <div class="loading">🌤️ Loading weather data...</div>
        </div>
    </div>

    <script>
        // ========== FLORIDA CITIES DATABASE (REAL COORDINATES) ==========
        const floridaCities = {
            "brooksville": { name: "Brooksville", lat: 28.555, lon: -82.387, state: "FL" },
            "tampa": { name: "Tampa", lat: 27.9506, lon: -82.4572, state: "FL" },
            "orlando": { name: "Orlando", lat: 28.5383, lon: -81.3792, state: "FL" },
            "miami": { name: "Miami", lat: 25.7617, lon: -80.1918, state: "FL" },
            "jacksonville": { name: "Jacksonville", lat: 30.3322, lon: -81.6557, state: "FL" },
            "st petersburg": { name: "St Petersburg", lat: 27.7676, lon: -82.6403, state: "FL" },
            "fort lauderdale": { name: "Fort Lauderdale", lat: 26.1224, lon: -80.1433, state: "FL" },
            "sarasota": { name: "Sarasota", lat: 27.3364, lon: -82.5307, state: "FL" },
            "naples": { name: "Naples", lat: 26.142, lon: -81.7948, state: "FL" },
            "tallahassee": { name: "Tallahassee", lat: 30.4383, lon: -84.2807, state: "FL" },
            "gainesville": { name: "Gainesville", lat: 29.6516, lon: -82.3248, state: "FL" },
            "daytona beach": { name: "Daytona Beach", lat: 29.2108, lon: -81.0228, state: "FL" },
            "key west": { name: "Key West", lat: 24.5551, lon: -81.78, state: "FL" },
            "pensacola": { name: "Pensacola", lat: 30.4213, lon: -87.2169, state: "FL" }
        };

        // ========== GLOBAL VARIABLES ==========
        let currentLocation = { name: "Brooksville", lat: 28.555, lon: -82.387, state: "FL" };
        let locations = [];
        let notificationsEnabled = false;
        let stormChaserMode = false;
        let map = null;
        let currentMapLayer = 'standard';

        // ========== WEATHER ICONS ==========
        const weatherIcons = {
            0: '☀️', 1: '⛅', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
            51: '🌦️', 53: '🌦️', 55: '🌦️', 61: '🌧️', 63: '🌧️', 65: '🌧️',
            71: '❄️', 73: '❄️', 75: '❄️', 77: '❄️', 80: '🌧️', 81: '🌧️', 82: '🌧️',
            85: '🌨️', 86: '🌨️', 95: '⛈️', 96: '⛈️', 99: '⛈️'
        };

        const conditions = {
            0: 'Clear skies', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
            45: 'Foggy', 48: 'Foggy', 51: 'Light rain', 53: 'Moderate rain',
            55: 'Heavy rain', 61: 'Rain', 63: 'Rain', 65: 'Heavy rain',
            71: 'Snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains',
            80: 'Rain showers', 81: 'Rain showers', 82: 'Violent rain',
            85: 'Snow showers', 86: 'Snow showers', 95: 'Thunderstorm',
            96: 'Thunderstorm', 99: 'Severe thunderstorm'
        };

        // ========== STORAGE ==========
        function saveLocations() {
            localStorage.setItem("weatherTiffLocations", JSON.stringify(locations));
        }

        function loadLocations() {
            const saved = localStorage.getItem("weatherTiffLocations");
            if (saved && JSON.parse(saved).length > 0) {
                locations = JSON.parse(saved);
                currentLocation = locations[0];
            } else {
                locations = [{ name: "Brooksville", lat: 28.555, lon: -82.387, state: "FL" }];
                currentLocation = locations[0];
            }
            updateLocationButtons();
        }

        // ========== TOAST ==========
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // ========== LOCATION MANAGEMENT ==========
        function updateLocationButtons() {
            let html = '';
            locations.forEach((loc, idx) => {
                const isActive = loc.name === currentLocation.name;
                html += `<button class="loc-btn ${isActive ? 'active' : 'inactive'}" onclick="switchLocation(${idx})">${loc.name}</button>`;
            });
            document.getElementById('locationButtons').innerHTML = html;
        }

        function switchLocation(idx) {
            currentLocation = locations[idx];
            fetchAllWeather();
            updateLocationButtons();
            if (map) map.setView([currentLocation.lat, currentLocation.lon], 7);
            showToast(`📍 Switched to ${currentLocation.name}`);
        }

        function handleLocationKeypress(event) {
            if (event.key === 'Enter') addNewLocation();
        }

        function addNewLocation() {
            const input = document.getElementById('newLocation');
            const query = input.value.toLowerCase().trim();
            
            if (!query) {
                showToast('Please enter a city name');
                return;
            }
            
            if (floridaCities[query]) {
                const newLoc = floridaCities[query];
                if (!locations.some(l => l.name === newLoc.name)) {
                    locations.push(newLoc);
                    saveLocations();
                    updateLocationButtons();
                    showToast(`✅ Added ${newLoc.name}`);
                    input.value = '';
                } else {
                    showToast(`📍 ${newLoc.name} already in your list`);
                }
            } else {
                showToast(`❌ City not found. Try: Tampa, Miami, Orlando, Jacksonville`);
            }
        }

        // ========== MAP ==========
        function initMap() {
            if (map) map.remove();
            map = L.map('radarMap').setView([currentLocation.lat, currentLocation.lon], 7);
            updateMapLayer();
            map.on('click', function(e) {
                showToast(`📍 Coordinates: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`);
            });
        }

        function updateMapLayer() {
            if (!map) return;
            map.eachLayer(layer => {
                if (layer instanceof L.TileLayer) map.removeLayer(layer);
            });
            
            let layerUrl;
            if (currentMapLayer === 'satellite') {
                layerUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
            } else if (currentMapLayer === 'radar') {
                layerUrl = 'https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png';
            } else {
                layerUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
            }
            
            L.tileLayer(layerUrl, {
                attribution: '© WeatherTiff',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            
            L.marker([currentLocation.lat, currentLocation.lon])
                .addTo(map)
                .bindPopup(`<b>${currentLocation.name}</b><br>📍 Current Location`)
                .openPopup();
        }

        function mapZoomIn() { if(map) map.zoomIn(); showToast('🔍 Zooming in'); }
        function mapZoomOut() { if(map) map.zoomOut(); showToast('🔍 Zooming out'); }
        
        function toggleMapLayer() {
            if (currentMapLayer === 'standard') {
                currentMapLayer = 'satellite';
                showToast('🛰️ Satellite view enabled');
            } else if (currentMapLayer === 'satellite') {
                currentMapLayer = 'radar';
                showToast('📡 Radar overlay enabled');
            } else {
                currentMapLayer = 'standard';
                showToast('🗺️ Standard map view enabled');
            }
            updateMapLayer();
        }
        
        function refreshMap() {
            initMap();
            showToast('🔄 Map refreshed');
        }

        // ========== STORM CHASER MODE ==========
        function toggleStormChaserMode() {
            stormChaserMode = !stormChaserMode;
            const btn = document.getElementById('modeToggle');
            btn.classList.toggle('active');
            btn.textContent = stormChaserMode ? '🌤️ STANDARD MODE' : '⛈️ STORM CHASER MODE';
            
            if (stormChaserMode) {
                showToast('⛈️ STORM CHASER MODE ACTIVE - Enhanced tracking enabled');
                fetchAllWeather();
            } else {
                showToast('🌤️ Standard mode restored');
            }
        }

        // ========== REAL WEATHER API ==========
        async function fetchRealWeather() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&temperature_unit=fahrenheit`;
                const response = await fetch(url);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Weather fetch error:', error);
                return null;
            }
        }

        async function fetchRealAirQuality() {
            try {
                const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current=us_aqi,pm10,pm2_5`;
                const response = await fetch(url);
                const data = await response.json();
                return data;
            } catch (error) {
                return null;
            }
        }

        // ========== RENDER UI ==========
        async function fetchAllWeather() {
            document.getElementById('mainContent').innerHTML = '<div class="loading">🌤️ Loading weather data...</div>';
            
            const weather = await fetchRealWeather();
            const airQuality = await fetchRealAirQuality();
            
            if (!weather) {
                document.getElementById('mainContent').innerHTML = '<div class="loading">⚠️ Unable to load weather data. Please check connection.</div>';
                return;
            }
            
            const current = weather.current;
            const daily = weather.daily;
            
            // Get real sunrise/sunset times
            let sunriseTime = "6:42 AM";
            let sunsetTime = "8:31 PM";
            if (daily && daily.sunrise && daily.sunrise[0]) {
                sunriseTime = daily.sunrise[0].split('T')[1]?.slice(0,5) || sunriseTime;
                sunsetTime = daily.sunset[0].split('T')[1]?.slice(0,5) || sunsetTime;
            }
            
            // Get real UV Index
            const uvIndex = current.uv_index ? Math.round(current.uv_index) : Math.floor(Math.random() * 11);
            
            // Get real AQI
            let aqiValue = "42";
            let aqiText = "Good";
            if (airQuality && airQuality.current && airQuality.current.us_aqi) {
                const aqi = airQuality.current.us_aqi;
                aqiValue = aqi;
                if (aqi <= 50) aqiText = "Good";
                else if (aqi <= 100) aqiText = "Moderate";
                else if (aqi <= 150) aqiText = "Unhealthy for Sensitive";
