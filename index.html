<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WeatherTiff - Premium Weather Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Leaflet for Map -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 35%, #3d2a5f 70%, #2d1b4e 100%);
    color: white;
    padding: 20px;
    min-height: 100vh;
    transition: background 0.3s ease;
    overflow-x: hidden;
}

body.light-mode {
    background: linear-gradient(135deg, #e8d5f5 0%, #d4c4e8 100%);
    color: #1a1a2e;
}

body.light-mode .card {
    background: rgba(255,255,255,0.85);
}

body.light-mode .detail-value,
body.light-mode .temp,
body.light-mode .location {
    color: #1a1a2e;
}

.container {
    max-width: 700px;
    margin: auto;
    position: relative;
    z-index: 2;
}

/* HEADER */
.header {
    position: relative;
    margin-bottom: 20px;
    text-align: center;
}

.title {
    font-size: 56px;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    position: relative;
    z-index: 20;
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 5px;
}

/* FANCY TIFF FONT - Using Google Fonts "Pacifico" for the fancy extended script look */
.fancy-tiff {
    font-family: 'Pacifico', 'Brush Script MT', 'Snell Roundhand', cursive;
    font-size: 1.3em;
    font-weight: 400;
    display: inline-block;
    background: linear-gradient(135deg, #f3cfa9, #d4a574, #b88654);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: none;
    letter-spacing: 3px;
    margin-left: 8px;
    transform: rotate(-1deg);
    position: relative;
}

/* Fallback for browsers that don't support background-clip */
.title span {
    color: #d4a574;
}

/* CLOUD BANNER - CLOUDS FLOATING OVER PREMIUM WEATHER INTELLIGENCE (SLOWER) */
.cloud-banner {
    position: relative;
    height: 60px;
    margin-top: 0px;
    margin-bottom: -15px;
    overflow: visible;
    z-index: 5;
}

.cloud-float {
    position: absolute;
    width: 100px;
    height: 40px;
    opacity: 0.6;
    pointer-events: none;
    z-index: 5;
    filter: blur(0.5px);
}

.cloud-1 {
    top: -5px;
    left: 5%;
    animation: floatCloud1 28s ease-in-out infinite;
}

.cloud-2 {
    top: 15px;
    right: 8%;
    width: 80px;
    height: 32px;
    opacity: 0.45;
    animation: floatCloud2 32s ease-in-out infinite;
}

.cloud-3 {
    top: 25px;
    left: 15%;
    width: 70px;
    height: 28px;
    opacity: 0.35;
    animation: floatCloud3 38s ease-in-out infinite;
}

.cloud-4 {
    top: 0px;
    right: 20%;
    width: 90px;
    height: 36px;
    opacity: 0.55;
    animation: floatCloud4 26s ease-in-out infinite;
}

@keyframes floatCloud1 {
    0% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(18px) translateY(-4px); }
    50% { transform: translateX(30px) translateY(0); }
    75% { transform: translateX(18px) translateY(4px); }
    100% { transform: translateX(0) translateY(0); }
}

@keyframes floatCloud2 {
    0% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-15px) translateY(-3px); }
    50% { transform: translateX(-25px) translateY(0); }
    75% { transform: translateX(-15px) translateY(3px); }
    100% { transform: translateX(0) translateY(0); }
}

@keyframes floatCloud3 {
    0% { transform: translateX(0) translateY(0); }
    33% { transform: translateX(12px) translateY(-5px); }
    66% { transform: translateX(20px) translateY(0); }
    100% { transform: translateX(0) translateY(0); }
}

@keyframes floatCloud4 {
    0% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-10px) translateY(-3px); }
    50% { transform: translateX(-18px) translateY(0); }
    75% { transform: translateX(-10px) translateY(3px); }
    100% { transform: translateX(0) translateY(0); }
}

.subtitle-container {
    position: relative;
    margin-top: 5px;
    margin-bottom: 15px;
    text-align: center;
    z-index: 10;
}

.subtitle {
    letter-spacing: 4px;
    font-size: 10px;
    color: #cdb7ff;
    font-weight: 600;
    position: relative;
    z-index: 20;
    display: inline-block;
    background: rgba(0,0,0,0.2);
    padding: 5px 15px;
    border-radius: 30px;
    backdrop-filter: blur(2px);
}

.dark-toggle {
    background: rgba(212,165,116,0.2);
    border: 1px solid #d4a574;
    border-radius: 30px;
    padding: 8px 18px;
    font-size: 12px;
    cursor: pointer;
    color: #d4a574;
    font-weight: 600;
    transition: all 0.3s;
    position: absolute;
    top: 0;
    right: 0;
    z-index: 30;
}

.dark-toggle:hover {
    background: #d4a574;
    color: #1a2332;
}

.locations-panel {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(212,165,116,0.3);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 18px;
}

.locations-title {
    font-size: 12px;
    color: #d4a574;
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: 1px;
}

.locations-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}

.loc-btn {
    padding: 8px 16px;
    border-radius: 25px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.loc-btn.active {
    background: #d4a574;
    color: #1a2332;
    border: none;
}

.loc-btn.inactive {
    background: transparent;
    border: 1px solid #d4a574;
    color: #d4a574;
}

.address-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 40px;
    border: 1px solid rgba(212,165,116,0.5);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
}

.address-input::placeholder {
    color: rgba(212,165,116,0.7);
}

.card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(212,165,116,0.25);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 18px;
    transition: all 0.3s;
}

.card:hover {
    border-color: #d4a574;
    transform: translateY(-2px);
}

.location {
    font-size: 38px;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
}

.temp {
    font-size: 78px;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    line-height: 1;
}

.condition {
    margin-top: 6px;
    color: #dfeeff;
}

.details {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(212,165,116,0.2);
}

.detail {
    text-align: center;
}

.label {
    font-size: 10px;
    color: #d4a574;
    letter-spacing: 1px;
    margin-bottom: 5px;
    font-weight: 600;
}

.value {
    font-size: 15px;
    font-weight: 700;
}

.extended-details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 15px;
}

/* Windy Radar Container */
.radar {
    width: 100%;
    height: 320px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(212,165,116,0.3);
}

.radar iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.map-controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

.map-btn {
    background: #d4a574;
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: #1a2332;
    transition: all 0.2s;
}

.map-btn:hover {
    transform: scale(1.02);
    background: #e8b88f;
}

.forecast {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-top: 15px;
}

.day-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212,165,116,0.2);
    padding: 10px 5px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.25s;
}

.day-card:hover {
    transform: translateY(-3px);
    background: rgba(212,165,116,0.15);
}

.day-card.active {
    border: 2px solid #d4a574;
    background: rgba(212,165,116,0.2);
}

.day {
    font-size: 11px;
    color: #d4a574;
    margin-bottom: 5px;
    font-weight: 600;
}

.icon {
    font-size: 24px;
}

.high {
    font-weight: 700;
    font-size: 14px;
}

.low {
    font-size: 11px;
    color: #bcbcbc;
}

.alert-item, .storm-item {
    background: rgba(212,165,116,0.1);
    border-left: 4px solid #d4a574;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.alert-item:hover, .storm-item:hover {
    background: rgba(212,165,116,0.2);
    transform: translateX(5px);
}

.alert-critical {
    background: rgba(230,76,76,0.15);
    border-left-color: #e64c4c;
}

.alert-title {
    font-size: 12px;
    font-weight: 700;
    color: #d4a574;
}

.alert-critical .alert-title {
    color: #ff8888;
}

.no-alerts {
    text-align: center;
    color: #aaa;
    padding: 20px;
    font-size: 13px;
}

.storm-name {
    font-size: 13px;
    font-weight: 700;
    color: #ff8c42;
}

.aqi-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.aqi-card {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
}

.aqi-card:hover {
    background: rgba(212,165,116,0.15);
}

.aqi-value {
    font-size: 20px;
    font-weight: 700;
    color: #7fb069;
}

.notification-btn {
    width: 100%;
    padding: 14px;
    background: #d4a574;
    color: #1a2332;
    border: none;
    border-radius: 40px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s;
}

.notification-btn:hover {
    transform: scale(1.01);
}

.notification-btn.enabled {
    background: #2ecc71;
    color: white;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: #d4a574;
    color: #1a2332;
    padding: 12px 20px;
    border-radius: 30px;
    text-align: center;
    font-weight: 600;
    z-index: 1000;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.loading {
    text-align: center;
    padding: 60px;
    color: #d4a574;
}

.suggestions-dropdown {
    margin-top: 8px;
    max-height: 150px;
    overflow-y: auto;
    background: rgba(0,0,0,0.9);
    border-radius: 12px;
    display: none;
    z-index: 100;
    position: relative;
}

.suggestion-item {
    padding: 10px 15px;
    cursor: pointer;
    border-bottom: 1px solid rgba(212,165,116,0.2);
    color: #d4a574;
    font-size: 12px;
}

.suggestion-item:hover {
    background: rgba(212,165,116,0.2);
}

/* Hide suggestions on outside click */
@media (max-width: 600px) {
    .title { font-size: 42px; }
    .fancy-tiff { font-size: 1.2em; }
    .location { font-size: 32px; }
    .temp { font-size: 62px; }
    .forecast { gap: 4px; }
    .day-card { padding: 8px 3px; }
    .details { grid-template-columns: repeat(2, 1fr); }
    .dark-toggle { position: static; margin-bottom: 10px; }
    .header { display: flex; flex-direction: column; align-items: center; }
    .cloud-1, .cloud-2, .cloud-3, .cloud-4 { display: none; }
}
</style>

</head>
<body>

<div class="container">
    <div class="header">
        <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark</button>
        
        <div class="title">
            Weather<span class="fancy-tiff">Tiff</span>
        </div>
        
        <!-- CLOUDS FLOATING OVER PREMIUM WEATHER INTELLIGENCE (SLOWER ANIMATION) -->
        <div class="cloud-banner">
            <svg class="cloud-float cloud-1" viewBox="0 0 120 50" fill="white">
                <ellipse cx="50" cy="20" rx="22" ry="12" fill="white" opacity="0.9"/>
                <ellipse cx="30" cy="26" rx="16" ry="10" fill="white" opacity="0.85"/>
                <ellipse cx="70" cy="26" rx="16" ry="10" fill="white" opacity="0.85"/>
            </svg>
            <svg class="cloud-float cloud-2" viewBox="0 0 100 40" fill="white">
                <ellipse cx="40" cy="15" rx="18" ry="10" fill="white" opacity="0.8"/>
                <ellipse cx="25" cy="20" rx="13" ry="8" fill="white" opacity="0.75"/>
                <ellipse cx="55" cy="20" rx="13" ry="8" fill="white" opacity="0.75"/>
            </svg>
            <svg class="cloud-float cloud-3" viewBox="0 0 80 35" fill="white">
                <ellipse cx="35" cy="12" rx="14" ry="8" fill="white" opacity="0.7"/>
                <ellipse cx="22" cy="17" rx="10" ry="6" fill="white" opacity="0.65"/>
                <ellipse cx="48" cy="17" rx="10" ry="6" fill="white" opacity="0.65"/>
            </svg>
            <svg class="cloud-float cloud-4" viewBox="0 0 110 45" fill="white">
                <ellipse cx="45" cy="18" rx="20" ry="11" fill="white" opacity="0.85"/>
                <ellipse cx="28" cy="24" rx="14" ry="9" fill="white" opacity="0.8"/>
                <ellipse cx="62" cy="24" rx="14" ry="9" fill="white" opacity="0.8"/>
            </svg>
        </div>
        
        <div class="subtitle-container">
            <div class="subtitle">
                PREMIUM WEATHER INTELLIGENCE
            </div>
        </div>
    </div>

    <div class="locations-panel">
        <div class="locations-title">📍 MY LOCATIONS</div>
        <div class="locations-buttons" id="locationBtns"></div>
        <input type="text" id="addressInput" class="address-input" placeholder="Enter your full address or city..." onkeyup="searchAddress(this.value)" onkeypress="handleAddressKeypress(event)">
        <div id="suggestions" class="suggestions-dropdown"></div>
    </div>

    <div id="weatherContent">
        <div class="loading">🌤️ Loading weather data...</div>
    </div>
</div>

<script>
// ========== STORAGE & LOCATIONS ==========
let savedLocs = [];
let currentLoc = null;
let notifOn = false;

// Default Florida locations
const defaultLocs = [
    { name: "Brooksville", lat: 28.555, lon: -82.387 },
    { name: "Tampa", lat: 27.9506, lon: -82.4572 },
    { name: "Orlando", lat: 28.5383, lon: -81.3792 },
    { name: "Miami", lat: 25.7617, lon: -80.1918 }
];

function saveToStorage() {
    localStorage.setItem("wtLocs", JSON.stringify(savedLocs));
}

function loadFromStorage() {
    const saved = localStorage.getItem("wtLocs");
    if (saved && JSON.parse(saved).length > 0) {
        savedLocs = JSON.parse(saved);
        currentLoc = savedLocs[0];
    } else {
        savedLocs = [...defaultLocs];
        currentLoc = savedLocs[0];
        saveToStorage();
    }
    updateLocationButtons();
}

function updateLocationButtons() {
    let html = "";
    savedLocs.forEach((loc, i) => {
        let activeClass = currentLoc && loc.name === currentLoc.name ? "active" : "inactive";
        html += `<button class="loc-btn ${activeClass}" onclick="switchLocation(${i})">${loc.name}</button>`;
    });
    document.getElementById("locationBtns").innerHTML = html;
}

function switchLocation(index) {
    currentLoc = savedLocs[index];
    updateLocationButtons();
    loadAllWeather();
    if (window.weatherMap) window.weatherMap.setView([currentLoc.lat, currentLoc.lon], 10);
    showToast(`📍 ${currentLoc.name}`);
}

function showToast(msg) {
    let old = document.querySelector(".toast");
    if (old) old.remove();
    let toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// Address search with Nominatim - FINDS ANY ADDRESS
let searchTimeout;
async function searchAddress(query) {
    const suggestionsDiv = document.getElementById('suggestions');
    if (!query || query.length < 3) {
        suggestionsDiv.style.display = 'none';
        return;
    }
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1&countrycodes=us`;
            const response = await fetch(url, { headers: { 'User-Agent': 'WeatherTiff/1.0' } });
            const data = await response.json();
            if (data.length > 0) {
                suggestionsDiv.innerHTML = data.map(item => `
                    <div class="suggestion-item" onclick="selectAddress(${item.lat}, ${item.lon}, '${item.display_name.replace(/'/g, "\\'")}')">
                        📍 ${item.display_name.substring(0, 70)}
                    </div>
                `).join('');
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        } catch(e) { suggestionsDiv.style.display = 'none'; }
    }, 500);
}

function selectAddress(lat, lon, name) {
    document.getElementById('addressInput').value = name;
    document.getElementById('suggestions').style.display = 'none';
    const newLoc = { name: name.split(',')[0], lat: parseFloat(lat), lon: parseFloat(lon), fullName: name };
    if (!savedLocs.some(l => l.name === newLoc.name)) {
        savedLocs.push(newLoc);
        saveToStorage();
        updateLocationButtons();
        showToast(`✅ Added ${newLoc.name}`);
        currentLoc = newLoc;
        loadAllWeather();
        if (window.weatherMap) window.weatherMap.setView([currentLoc.lat, currentLoc.lon], 12);
    } else {
        showToast(`📍 ${newLoc.name} already in list`);
        currentLoc = savedLocs.find(l => l.name === newLoc.name);
        loadAllWeather();
        updateLocationButtons();
    }
}

function handleAddressKeypress(e) {
    if (e.key === 'Enter') {
        document.getElementById('suggestions').style.display = 'none';
        const query = e.target.value;
        if (query) quickAddAddress(query);
    }
}

async function quickAddAddress(query) {
    try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&addressdetails=1&countrycodes=us`;
        const response = await fetch(url, { headers: { 'User-Agent': 'WeatherTiff/1.0' } });
        const data = await response.json();
        if (data.length > 0) {
            const item = data[0];
            const newLoc = { name: item.display_name.split(',')[0], lat: parseFloat(item.lat), lon: parseFloat(item.lon), fullName: item.display_name };
            if (!savedLocs.some(l => l.name === newLoc.name)) {
                savedLocs.push(newLoc);
                saveToStorage();
                updateLocationButtons();
                showToast(`✅ Added ${newLoc.name}`);
                currentLoc = newLoc;
                loadAllWeather();
                if (window.weatherMap) window.weatherMap.setView([currentLoc.lat, currentLoc.lon], 12);
            } else {
                showToast(`📍 ${newLoc.name} already in list`);
            }
        } else {
            showToast(`❌ Address not found. Try city and state.`);
        }
    } catch(e) { showToast(`❌ Search error. Please try again.`); }
}

// ========== WEATHER API ==========
async function getRealWeather() {
    try {
        let url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLoc.lat}&longitude=${currentLoc.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&temperature_unit=fahrenheit`;
        let resp = await fetch(url);
        return await resp.json();
    } catch(e) { return null; }
}

async function getAirQuality() {
    try {
        let url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${currentLoc.lat}&longitude=${currentLoc.lon}&current=us_aqi`;
        let resp = await fetch(url);
        return await resp.json();
    } catch(e) { return null; }
}

// ========== DARK MODE ==========
function toggleDarkMode() {
    document.body.classList.toggle("light-mode");
    const btn = document.querySelector(".dark-toggle");
    btn.innerHTML = document.body.classList.contains("light-mode") ? "☀️ Light" : "🌙 Dark";
}

// ========== NOTIFICATIONS ==========
function enableNotifications() {
    notifOn = !notifOn;
    const btn = document.getElementById("notifyBtn");
    if (btn) {
        btn.innerText = notifOn ? "✅ Alerts Enabled" : "🔔 Enable Weather Alerts";
        btn.classList.toggle("enabled");
    }
    if (notifOn && "Notification" in window) Notification.requestPermission();
}

// ========== MAP FUNCTIONS ==========
let weatherMap = null;
let mapLayerType = "standard";

function initMap() {
    if (weatherMap) weatherMap.remove();
    weatherMap = L.map("radarMap").setView([currentLoc.lat, currentLoc.lon], 8);
    updateMapLayer();
    weatherMap.on("click", (e) => showToast(`📍 ${e.latlng.lat.toFixed(3)}, ${e.latlng.lng.toFixed(3)}`));
    window.weatherMap = weatherMap;
}

function updateMapLayer() {
    if (!weatherMap) return;
    weatherMap.eachLayer(layer => { if (layer instanceof L.TileLayer) weatherMap.removeLayer(layer); });
    let tileUrl = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
    if (mapLayerType === "satellite") tileUrl = "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}";
    else if (mapLayerType === "radar") tileUrl = "https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png";
    L.tileLayer(tileUrl, { attribution: "© WeatherTiff", maxZoom: 19 }).addTo(weatherMap);
    L.marker([currentLoc.lat, currentLoc.lon]).addTo(weatherMap).bindPopup(`<b>${currentLoc.name}</b>`).openPopup();
}

function mapZoomIn() { weatherMap?.zoomIn(); showToast("🔍 Zooming in"); }
function mapZoomOut() { weatherMap?.zoomOut(); showToast("🔍 Zooming out"); }
function cycleMapLayer() {
    if (mapLayerType === "standard") mapLayerType = "satellite";
    else if (mapLayerType === "satellite") mapLayerType = "radar";
    else mapLayerType = "standard";
    updateMapLayer();
    showToast(`🗺️ ${mapLayerType} view`);
}
function refreshMap() { initMap(); showToast("🔄 Map refreshed"); }
